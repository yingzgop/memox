# MemoX Data Examples

## Example: Decision Record

```yaml
decisions:
  - id: D20260320001
    date: "2026-03-20"
    topic: "Memory System Selection"
    decision: "Use MemoX structured memory, defer graph-memory"
    reasoning: |
      graph-memory requires additional LLM and Embedding APIs,
      increasing complexity and cost.
      Hybrid approach (YAML + Markdown) provides 90% compression,
      zero extra cost, easier maintenance.
    alternatives:
      - "Install graph-memory"
      - "Use vector database"
      - "Use built-in compaction only"
    status: implemented
    tags: ["memory", "token-optimization", "architecture"]
    source: "memory/2026-03-20.md#L45-L60"
    key_quotes:
      - "graph-memory requires additional LLM and Embedding APIs"
      - "75% compression vs 90% compression"
```

